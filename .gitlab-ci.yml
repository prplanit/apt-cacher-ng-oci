stages:
  - build
  - security
  - docs
  - release

variables:
  SF_IMAGE: "docker.jcr.pcfae.com/prplanit/stagefreight:latest-dev"
  DOCKER_HOST: "tcp://docker:2376"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "/certs/client"
  DOCKER_TLS_CERTDIR: "/certs"

# ── Build ────────────────────────────────────────────────────────
build-image:
  stage: build
  image: "$SF_IMAGE"
  services:
    - name: docker:28.1.1-dind
      alias: docker
  script:
    - stagefreight build --push
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"

# ── Security ─────────────────────────────────────────────────────
security-scan:
  stage: security
  image: "$SF_IMAGE"
  services:
    - name: docker:28.1.1-dind
      alias: docker
  needs: [build-image]
  script:
    - stagefreight security scan docker.io/prplanit/apt-cacher-ng-oci
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"

# ── Docs ─────────────────────────────────────────────────────────
docs-refresh:
  stage: docs
  image: "$SF_IMAGE"
  services:
    - name: docker:28.1.1-dind
      alias: docker
  needs: [build-image]
  script:
    - stagefreight narrator run --commit --push
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"

# ── Release ──────────────────────────────────────────────────────
create-release:
  stage: release
  image: "$SF_IMAGE"
  needs: [build-image, security-scan, docs-refresh]
  script:
    - stagefreight release create
  rules:
    - if: $CI_COMMIT_TAG
